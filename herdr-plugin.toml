id = "tally"
name = "tally"
version = "0.1.5"
description = "Project-scoped todos & scratchpads for you and your agents."
min_herdr_version = "0.7.0"
platforms = ["macos", "linux"]

[[build]]
platforms = ["linux", "macos"]
# Runs on every `herdr plugin install` / re-link: fetch-or-build the binary into
# bin/tally, then best-effort register the MCP server and write the tally guidance
# block into ~/.claude/CLAUDE.md.
command = ["/bin/sh", "scripts/install.sh"]

# NOTE: panes open with cwd = the user's project (not the plugin root), and herdr
# only resolves a relative *program* against the plugin root — not a script passed
# as an argument. Locate the binary via $HERDR_PLUGIN_ROOT (which herdr injects into
# every plugin command) instead of a bare relative path.
[[panes]]
id = "todos"
title = "Tally"
placement = "split"
command = ["bash", "-c", 'export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH"; exec "$HERDR_PLUGIN_ROOT/bin/tally" tui todos']

[[panes]]
id = "scratchpads"
title = "Scratchpads"
placement = "split"
command = ["bash", "-c", 'export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH"; exec "$HERDR_PLUGIN_ROOT/bin/tally" tui scratchpads']

[[actions]]
id = "toggle-todos"
title = "Todos pane"
description = "Open, focus, or close the todos pane for this project."
command = ["bash", "scripts/toggle-pane.sh", "todos"]

[[actions]]
id = "toggle-scratchpads"
title = "Scratchpads pane"
description = "Open, focus, or close the scratchpads pane for this project."
command = ["bash", "scripts/toggle-pane.sh", "scratchpads"]

[[events]]
on = "worktree.created"
command = ["bash", "scripts/on-worktree.sh"]
